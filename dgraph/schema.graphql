type Process {
  id: ID!
  name: String! @index(exact)
  definitionId: String! @index(exact)
  version: Int! @index(int)
  status: String! @index(exact)
  startTime: DateTime! @index(hour)
  endTime: DateTime
  tasks: [Task] @hasInverse(field: process)
  events: [Event] @hasInverse(field: process)
  gateways: [Gateway] @hasInverse(field: process)
}

type Task {
  id: ID!
  name: String! @index(exact)
  type: String! @index(exact)
  status: String! @index(exact)
  startTime: DateTime! @index(hour)
  endTime: DateTime
  process: Process!
  assignedAgent: Agent @hasInverse(field: currentTask)
  inputData: String
  outputData: String
}

type Event {
  id: ID!
  name: String! @index(exact)
  type: String! @index(exact)
  status: String! @index(exact)
  process: Process!
}

type Gateway {
  id: ID!
  name: String! @index(exact)
  type: String! @index(exact)
  status: String! @index(exact)
  process: Process!
}

type Agent {
  id: ID!
  name: String! @index(exact)
  type: String! @index(exact)
  status: String! @index(exact)
  currentTask: Task @hasInverse(field: assignedAgent)
}